<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Blue | Investimentos Modernos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <meta name="description" content="A plataforma de investimentos tecnológica e confiável. Comece a lucrar hoje com The Blue.">
</head>
<body>
    <!-- Splash Screen (Optional) -->
    <div id="splash" class="splash-screen" style="display: none;">
        <div class="logo-animation">The Blue</div>
    </div>

    <!-- Main App Container -->
    <main id="app">
        <!-- Content will be injected here via JavaScript -->
    </main>

    <!-- Bottom Navigation Bar (Hidden by default, shown when logged in) -->
    <nav id="bottom-nav" class="tab-bar" style="display: none;">
        <a href="#" class="tab-item active" data-view="dashboard">
            <i class="fa-solid fa-house tab-icon"></i>
            <span>Início</span>
        </a>
        <a href="#" class="tab-item" data-view="investments">
            <i class="fa-solid fa-chart-line tab-icon"></i>
            <span>Investir</span>
        </a>
        <a href="#" class="tab-item" data-view="wallet">
            <i class="fa-solid fa-wallet tab-icon"></i>
            <span>Carteira</span>
        </a>
        <a href="#" class="tab-item" data-view="referral">
            <i class="fa-solid fa-users tab-icon"></i>
            <span>Amigos</span>
        </a>
        <a href="#" class="tab-item" data-view="profile">
            <i class="fa-solid fa-user tab-icon"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
